<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3e;
    }
    nav .logo { font-size: 1.3rem; font-weight: 700; color: #7c6af7; }
    nav span { font-size: 0.85rem; color: #888; }

    /* LAYOUT */
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* SUMMARY CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 24px;
    }
    .card .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .card .amount { font-size: 2rem; font-weight: 700; }
    .card.income .amount  { color: #4ade80; }
    .card.expenses .amount { color: #f87171; }
    .card.savings .amount  { color: #7c6af7; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filters select, .filters input {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      color: #e0e0e0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .filters button {
      background: #7c6af7;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .filters button:hover { background: #6a58e0; }

    /* MAIN GRID */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
    }

    /* CHART */
    .chart-box {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 24px;
    }
    .chart-box h2 { font-size: 1rem; margin-bottom: 20px; color: #aaa; }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 180px;
    }
    .bar-group { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
    .bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      transition: height 0.4s ease;
    }
    .bar.income-bar  { background: #4ade80; }
    .bar.expense-bar { background: #f87171; }
    .bar-label { font-size: 0.7rem; color: #666; }

    /* TRANSACTIONS */
    .transactions-box {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }
    .transactions-box h2 { font-size: 1rem; margin-bottom: 16px; color: #aaa; }
    #transactions-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .txn-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #0f1117;
      border-radius: 8px;
      border: 1px solid #2a2d3e;
    }
    .txn-item .txn-name  { font-size: 0.9rem; }
    .txn-item .txn-meta  { font-size: 0.75rem; color: #666; margin-top: 2px; }
    .txn-item .txn-amount { font-weight: 700; }
    .txn-item .txn-amount.positive { color: #4ade80; }
    .txn-item .txn-amount.negative { color: #f87171; }

    /* AI INSIGHTS */
    .insights-box {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 24px;
    }
    .insights-box h2 { font-size: 1rem; margin-bottom: 16px; color: #aaa; }
    #insights-panel { display: flex; flex-direction: column; gap: 12px; }
    .insight-card {
      background: #0f1117;
      border-left: 3px solid #7c6af7;
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #ccc;
    }

    /* ADD TRANSACTION FORM */
    .add-form {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }
    .add-form h2 { font-size: 1rem; margin-bottom: 16px; color: #aaa; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row input, .form-row select {
      flex: 1;
      min-width: 140px;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .form-row button {
      background: #7c6af7;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .form-row button:hover { background: #6a58e0; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">💹 FinanceAI</div>
    <span id="current-month">Loading...</span>
  </nav>

  <div class="container">

    <!-- SUMMARY CARDS -->
    <div class="cards">
      <div class="card income">
        <div class="label">Total Income</div>
        <div class="amount" id="total-income">$0</div>
      </div>
      <div class="card expenses">
        <div class="label">Total Expenses</div>
        <div class="amount" id="total-expenses">$0</div>
      </div>
      <div class="card savings">
        <div class="label">Net Savings</div>
        <div class="amount" id="net-savings">$0</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <select id="filter-month">
        <option value="all">All Months</option>
        <option value="Jan">January</option>
        <option value="Feb">February</option>
        <option value="Mar">March</option>
        <option value="Apr">April</option>
        <option value="May">May</option>
        <option value="Jun">June</option>
      </select>
      <select id="filter-category">
        <option value="all">All Categories</option>
        <option value="Food">Food</option>
        <option value="Rent">Rent</option>
        <option value="Salary">Salary</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Transport">Transport</option>
        <option value="Freelance">Freelance</option>
      </select>
      <input type="number" id="filter-min" placeholder="Min amount" />
      <input type="number" id="filter-max" placeholder="Max amount" />
      <button id="apply-filters">Apply Filters</button>
      <button id="reset-filters">Reset</button>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- LEFT: Chart + Transactions + Add Form -->
      <div>
        <div class="chart-box">
          <h2>📊 Monthly Cash Flow</h2>
          <div class="chart-bars" id="chart-bars">
            <!-- JS will render bars here -->
          </div>
        </div>

        <div class="transactions-box">
          <h2>🧾 Transactions</h2>
          <ul id="transactions-list">
            <!-- JS will render transactions here -->
          </ul>
        </div>

        <div class="add-form">
          <h2>➕ Add Transaction</h2>
          <div class="form-row">
            <input type="text"   id="txn-name"     placeholder="Description" />
            <input type="number" id="txn-amount"   placeholder="Amount" />
            <select id="txn-type">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <select id="txn-category">
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Food">Food</option>
              <option value="Rent">Rent</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
            </select>
            <input type="text" id="txn-month" placeholder="Month (e.g. Jan)" />
            <button id="add-txn-btn">Add</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: AI Insights -->
      <div class="insights-box">
        <h2>🤖 AI Insights</h2>
        <div id="insights-panel">
          <!-- JS will render insights here -->
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
